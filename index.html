<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般常識クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 一般常識クイズ</h1>
    </header>

    <!-- クイズ画面 -->
    <div id="quiz-screen">
      <div class="progress-wrap">
        <span id="question-number" class="question-number"></span>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-box">
        <p id="question-text" class="question-text"></p>
      </div>

      <div id="choices-grid" class="choices-grid"></div>

      <div id="feedback" class="feedback"></div>

      <button id="next-btn" class="btn btn-primary hidden">次の問題へ →</button>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" class="hidden">
      <div class="result-box">
        <h2>クイズ終了！</h2>
        <div id="stars" class="stars"></div>
        <p id="score-text" class="score-text"></p>
        <p id="score-message" class="score-message"></p>

        <div id="cat-animation" class="cat-animation hidden">
          <div class="cat-stage">
            <span class="cat cat1">🐱</span>
            <span class="cat cat2">🐈</span>
            <span class="cat cat3">🐱</span>
          </div>
          <p class="cat-message">すごい！よくできました！🎉</p>
        </div>

        <button id="retry-btn" class="btn btn-retry">もう一度チャレンジ！</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
